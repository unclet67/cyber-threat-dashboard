name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collector syntax
        run: node --check scripts/fetch-news.mjs

      - name: Validate inline JS and news.json
        run: node scripts/validate.mjs
