name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax checks
        run: |
          node --check scripts/fetch-news.mjs
          node --check scripts/lib.mjs
          node --check app.js

      - name: Unit tests
        run: node --test tests/lib.test.mjs

      - name: Validate app JS and data schemas
        run: node scripts/validate.mjs
