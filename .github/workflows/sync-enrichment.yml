name: Sync enrichment data

on:
  schedule:
    - cron: '43 5 * * *'   # daily — ATT&CK changes rarely, EPSS updates daily
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Share the Pages concurrency group so deployments serialize with the other workflows.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  enrich:
    # Only run on main — the github-pages environment rejects deployments from other branches.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache/restore@v4
        with:
          path: |
            data/news.json
            data/kev.json
            data/archive.json
            data/attack.json
            data/epss.json
            feed.xml
          key: generated-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            generated-data-${{ runner.os }}-

      - name: Collect attack.json and epss.json
        run: node scripts/fetch-enrichment.mjs

      - uses: actions/cache/save@v4
        with:
          path: |
            data/news.json
            data/kev.json
            data/archive.json
            data/attack.json
            data/epss.json
            feed.xml
          key: generated-data-${{ runner.os }}-${{ github.run_id }}

      # Publish the refreshed site (including the enrichment data) to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
