name: Sync enrichment data

on:
  schedule:
    - cron: '43 5 * * *'   # daily — ATT&CK changes rarely, EPSS updates daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Share the Pages concurrency group so deployments serialize with the other workflows.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  enrich:
    # Only run on main — the github-pages environment rejects deployments from other branches.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect attack.json and epss.json
        run: node scripts/fetch-enrichment.mjs

      - name: Commit data if it changed
        run: |
          git add data/attack.json data/epss.json
          if git diff --cached --quiet; then
            echo "No enrichment changes — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh ATT&CK + EPSS enrichment [skip ci]"
            git push
          fi

      # Publish the refreshed site (including the enrichment data) to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
