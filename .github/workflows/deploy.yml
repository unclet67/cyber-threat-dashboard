name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Overlay the latest generated snapshot without adding hourly bot commits
      # to the source branch. A first deployment safely falls back to checked-in data.
      - uses: actions/cache/restore@v4
        with:
          path: |
            data/news.json
            data/kev.json
            data/archive.json
            data/attack.json
            data/epss.json
            feed.xml
          key: generated-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            generated-data-${{ runner.os }}-

      - uses: actions/configure-pages@v5

      # Static single-file site — publish the repo root as-is (no build step).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
