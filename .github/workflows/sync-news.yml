name: Sync news feed

on:
  schedule:
    - cron: '17 * * * *'   # hourly, at :17
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Share the Pages concurrency group with deploy.yml so deployments serialize.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    # Only run on main — the github-pages environment rejects deployments from other
    # branches, so a scheduled/dispatched run on a feature branch would fail fast.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect news.json and kev.json
        run: node scripts/fetch-news.mjs

      - name: Commit data if it changed
        run: |
          git add data/news.json data/kev.json data/archive.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh news + KEV feed [skip ci]"
            git push
          fi

      # Publish the refreshed site (including news.json) to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
