name: Sync news feed

on:
  schedule:
    - cron: '17 * * * *'   # hourly, at :17
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Share the Pages concurrency group with deploy.yml so deployments serialize.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect news into news.json
        run: node scripts/fetch-news.mjs

      - name: Commit news.json if it changed
        run: |
          if [[ -n "$(git status --porcelain news.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add news.json
            git commit -m "chore: refresh news feed [skip ci]"
            git push
          else
            echo "news.json unchanged — nothing to commit."
          fi

      # Publish the refreshed site (including news.json) to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
