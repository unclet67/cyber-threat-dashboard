name: Sync news feed

on:
  schedule:
    - cron: '17 * * * *'   # hourly, at :17
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Share the Pages concurrency group with deploy.yml so deployments serialize.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    # Only run on main — the github-pages environment rejects deployments from other
    # branches, so a scheduled/dispatched run on a feature branch would fail fast.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Generated data is kept out of main. Restore the latest snapshot so the
      # rolling archive and daily enrichment survive between workflow runs.
      - uses: actions/cache/restore@v4
        with:
          path: |
            data/news.json
            data/kev.json
            data/archive.json
            data/attack.json
            data/epss.json
            feed.xml
          key: generated-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            generated-data-${{ runner.os }}-

      - name: Collect news.json and kev.json
        run: node scripts/fetch-news.mjs

      - uses: actions/cache/save@v4
        with:
          path: |
            data/news.json
            data/kev.json
            data/archive.json
            data/attack.json
            data/epss.json
            feed.xml
          key: generated-data-${{ runner.os }}-${{ github.run_id }}

      # Publish the refreshed site (including news.json) to Pages.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
